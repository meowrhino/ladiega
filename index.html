<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>la diega</title>
    <meta name="description" content="la diega — music, sound design & sfx">
    <link rel="icon" type="image/png" href="data/navicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Carrusel: dos slides que se alternan para el desplazamiento -->
    <div id="stage" class="stage">
        <div class="slide" data-slide="a">
            <video class="bg-video" muted playsinline preload="none"></video>
            <video class="main-video" muted playsinline preload="auto"></video>
        </div>
        <div class="slide offright" data-slide="b">
            <video class="bg-video" muted playsinline preload="none"></video>
            <video class="main-video" muted playsinline preload="auto"></video>
        </div>
    </div>

    <!-- Gestoria: foto de fondo en lugar del carrusel -->
    <div id="gestoriaView" class="gestoria hidden">
        <img id="gestoriaPhoto" src="" alt="la diega">
    </div>

    <!-- La telita -->
    <div class="veil"></div>

    <!-- Esquinas: las tres abren el menu -->
    <button id="menuBtn" class="ui" aria-label="abrir menú">menú</button>
    <button id="brandBtn" class="ui" aria-label="abrir menú">la diega</button>
    <button id="ficha" class="ui ficha" aria-label="abrir menú"></button>

    <!-- Flechas de carrusel -->
    <button id="arrowPrev" class="edge-arrow left" aria-label="video anterior">◀</button>
    <button id="arrowNext" class="edge-arrow right" aria-label="video siguiente">▶</button>

    <!-- Titulo gigante al cambiar de video -->
    <div id="bigTitle" class="big-title hidden" aria-hidden="true"></div>

    <!-- Barrido diagonal al navegar desde el menu -->
    <div id="wipe" class="wipe" aria-hidden="true"></div>

    <!-- Navegacion del video: elementos sueltos repartidos por la pantalla -->
    <div id="controls" class="controls faded">
        <button id="playBtn" class="ctrl play-big">pause</button>
        <input id="seekBar" class="ctrl" type="range" min="0" max="1000" value="0" aria-label="progreso">
        <button id="autoBtn" class="ctrl toggle on" aria-label="avance automático">auto</button>
        <button id="soundBtn" class="ctrl toggle on" aria-label="sonido">sound</button>
    </div>

    <!-- Menu -->
    <div id="menuOverlay" class="overlay hidden">
        <div class="game-window menu-window window">
            <div class="window-header">
                <span>menú</span>
                <button id="menuClose" class="close-btn" aria-label="cerrar">×</button>
            </div>
            <nav id="menuNav" class="menu-nav" aria-label="menú principal"></nav>
        </div>
    </div>

    <!-- About -->
    <div id="aboutOverlay" class="overlay hidden">
        <div class="game-window about-window window">
            <div class="window-header">
                <span id="aboutTitle">about</span>
                <button id="aboutClose" class="close-btn" aria-label="cerrar">×</button>
            </div>
            <div id="aboutBody" class="about-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
